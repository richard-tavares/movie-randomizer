  <body>

    <div id="app-navbar"></div>

    <main id="personContent" class="page-content">

      <div class="person-hero"></div>

      <div class="person-content">
        <div class="person-profile">
          <div class="person-photo-wrap">
            <img id="personPhoto" src="" alt="" loading="eager">
          </div>
          <div class="person-info">
            <h1 class="person-name" id="personName">Carregando...</h1>
            <div class="person-meta" id="personMeta"></div>
            <div class="person-bio-section" id="personBioSection">
              <div class="movie-section-label">Biografia</div>
              <p class="person-bio" id="personBio"></p>
            </div>
          </div>
        </div>
      </div>

      <section class="section" id="worksSection" aria-labelledby="worksTitle">
        <div class="section-header">
          <h2 class="section-title" id="worksTitle">
            <span class="section-title-icon">
              <i class="ph ph-video"></i>
            </span> Conhecido por
          </h2>
        </div>
        <div class="person-works-grid" id="personWorksGrid"></div>
      </section>

    </main>

    <footer id="app-footer"></footer>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
