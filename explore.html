<!DOCTYPE html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore filmes, séries e animes — Movie Randomizer">
    <title>Explorar — Movie Randomizer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/explore.css">

    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/img/favicon-96x96.png" sizes="96x96" type="image/png">
    <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
  </head>

  <body>

    <div id="app-navbar"></div>

    <div class="explore-page">

      <div class="explore-header-bar">
        <h1 id="explorePageTitle">Explorar</h1>
        <p id="explorePageSub">Descubra filmes, séries e animes</p>
      </div>

      <div id="exploreSidebarOverlay" class="explore-sidebar-overlay"></div>

      <div class="explore-layout">

        <aside class="explore-sidebar" id="exploreSidebar">

          <div class="sidebar-section">
            <label class="sidebar-label" for="exploreStreaming">Plataforma</label>
            <select class="sidebar-select" id="exploreStreaming" multiple></select>
          </div>

          <div class="sidebar-section">
            <label class="sidebar-label" for="exploreGenres">Gêneros</label>
            <select class="sidebar-select" id="exploreGenres" multiple></select>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-section-header">
              <div class="sidebar-label">Ano</div>
              <span class="filter-value"><span id="exploreYearMinVal">1950</span> – <span id="exploreYearMaxVal">2026</span></span>
            </div>
            <div class="dual-range-wrap" id="exploreYearRange">
              <div class="dual-range-track">
                <div class="dual-range-fill"></div>
              </div>
              <input class="dual-range-input" type="range" id="exploreYearMin" min="1950" max="2026" value="1950" step="1">
              <input class="dual-range-input" type="range" id="exploreYearMax" min="1950" max="2026" value="2026" step="1">
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-section-header">
              <label class="sidebar-label" for="exploreRating">Nota Mínima</label>
              <span class="filter-value" id="exploreRatingVal">0.0</span>
            </div>
            <div class="dual-range-wrap" id="exploreRatingRange">
              <div class="dual-range-track">
                <div class="dual-range-fill"></div>
              </div>
              <input class="dual-range-input" type="range" id="exploreRating" min="0" max="9" value="0" step="0.5">
            </div>
          </div>

          <div class="sidebar-section" id="exploreCertSection">
            <label class="sidebar-label" for="exploreCert">Classificação Indicativa</label>
            <select class="sidebar-select" id="exploreCert">
              <option value="">Todas</option>
              <option value="L">Livre</option>
              <option value="10">10+</option>
              <option value="12">12+</option>
              <option value="14">14+</option>
              <option value="16">16+</option>
              <option value="18">18+</option>
            </select>
          </div>

          <div class="sidebar-section">
            <label class="sidebar-label" for="exploreCountry">País de Origem</label>
            <select class="sidebar-select" id="exploreCountry"></select>
          </div>

          <button class="btn btn-secondary" id="exploreClearFilters">
            <i class="ph-fill ph-funnel-x"></i> Limpar filtros
          </button>

        </aside>

        <main class="explore-main">

          <div class="explore-toolbar">
            <button class="btn btn-secondary explore-filter-toggle" id="exploreFilterToggle">
              <i class="ph-fill ph-funnel"></i> Filtros
            </button>

            <div class="explore-search-wrap">
              <span class="explore-search-icon"><i class="ph ph-magnifying-glass"></i></span>
              <input class="explore-search-input" id="exploreSearch" type="search" placeholder="Buscar por nome..." autocomplete="off" spellcheck="false">
            </div>

            <select class="explore-sort" id="exploreSort">
              <option value="popularity.desc">Mais populares</option>
              <option value="vote_average.desc">Melhor avaliação</option>
              <option value="release_date.desc">Lançamento recente</option>
              <option value="release_date.asc">Mais antigos</option>
            </select>
          </div>

          <div class="explore-results-count" id="exploreCount"></div>

          <div class="explore-grid" id="exploreGrid">
            <div class="loading-state">
              <div class="spinner"></div>
            </div>
          </div>

          <nav class="explore-pagination" id="explorePagination" aria-label="Paginação"></nav>

        </main>
      </div>
    </div>

    <footer id="app-footer"></footer>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/custom-select.js"></script>
    <script src="assets/js/watchlist.js"></script>
    <script src="assets/js/modal-watchlist.js"></script>
    <script src="assets/js/modal-trailer.js"></script>
    <script src="assets/js/modal-result.js"></script>
    <script src="assets/js/randomizer.js"></script>
    <script src="assets/js/explore.js"></script>
  </body>

</html>
