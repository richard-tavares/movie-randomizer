<!DOCTYPE html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detalhes — Movie Randomizer">
    <title>Carregando... — Movie Randomizer</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="">
    <meta name="twitter:description" content="">
    <meta name="twitter:image" content="">
    <link rel="canonical" href="">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/title.css">

    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/img/favicon-96x96.png" sizes="96x96" type="image/png">
    <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
  </head>

  <body>

    <div id="app-navbar"></div>

    <main id="titleContent" class="page-content">

      <div class="movie-hero" id="titleHero">
        <div class="movie-backdrop" id="titleBackdrop"></div>
        <div class="movie-backdrop-gradient"></div>
      </div>

      <div class="movie-content">
        <div class="movie-main">

          <aside class="movie-poster-col">
            <div class="movie-poster" id="titlePosterWrap">
              <img id="titlePoster" src="" alt="Poster" loading="eager">
            </div>

            <div class="movie-poster-actions"></div>
          </aside>

          <article class="movie-info-col">
            <div id="titleTypeBadge"></div>
            <h1 class="movie-title" id="titleName">Carregando...</h1>
            <p class="movie-tagline text-muted" id="titleTagline"></p>

            <div class="movie-rating-row">
              <i class="ph-fill ph-star movie-rating-star" aria-hidden="true"></i>
              <span class="movie-rating-value" id="titleRatingValue">—</span>
              <span class="movie-rating-source">/ 10 · TMDB</span>
              <span class="movie-rating-votes" id="titleVoteCount"></span>
            </div>

            <div class="movie-meta-row" id="titleMetaRow"></div>

            <div class="movie-genres" id="titleGenres" aria-label="Gêneros"></div>

            <div class="movie-actions" id="titleActionsTop">
              <button class="btn btn-primary" id="btnTrailer">
                <i class="ph-fill ph-play"></i>
                <span class="btn-trailer-text">Assistir Trailer</span><span class="btn-trailer-short">Trailer</span>
              </button>
              <button class="btn btn-secondary btn-collapse-mobile" id="btnRandSimilarInfo" title="Sortear Similar" aria-label="Sortear Similar">
                <span class="rand-dice-wrap">
                  <i class="ph ph-dice-five rand-dice-icon"></i>
                </span><span class="btn-collapse-text"> Sortear Similar</span>
              </button>
              <button class="btn-icon btn-icon-lg" id="btnWantMobile" title="Salvar" aria-label="Salvar">
                <i class="ph ph-plus"></i>
              </button>
              <button class="btn-icon btn-icon-lg btn-fav" id="btnFavoriteMobile" title="Favoritar" aria-label="Favoritar">
                <i class="ph ph-heart"></i>
              </button>
            </div>

            <div class="movie-synopsis-section">
              <div class="movie-section-label">Sinopse</div>
              <p class="movie-synopsis" id="titleSynopsis"></p>
            </div>

            <div id="watchProvidersInline" style="display:none">
              <div class="movie-section-label">
                <i class="ph ph-video"></i>
                Onde Assistir
              </div>
              <div id="watchProvidersContent"></div>
            </div>

            <div class="movie-details-grid" id="titleDetails"></div>

          </article>

        </div>
      </div>

      <section class="section movie-cast-section" id="castSection" aria-labelledby="castTitle">
        <div class="section-header">
          <h2 class="section-title" id="castTitle">
            <span class="section-title-icon">
              <i class="ph ph-users"></i>
            </span> Elenco Principal
          </h2>
        </div>
        <div class="carousel-wrap">
          <button class="carousel-btn carousel-btn-prev" aria-label="Anterior">
            <i class="ph ph-caret-left"></i>
          </button>
          <div class="carousel-track-outer">
            <div class="carousel-track" id="castTrack"></div>
          </div>
          <button class="carousel-btn carousel-btn-next" aria-label="Próximo">
            <i class="ph ph-caret-right"></i>
          </button>
        </div>
      </section>

      <section class="section movie-similar-section" id="similarSection" aria-labelledby="similarTitle">
        <div class="section-header">
          <h2 class="section-title" id="similarTitle">
            <span class="section-title-icon">
              <i class="ph ph-intersect"></i>
            </span> Títulos Similares
          </h2>
        </div>
        <div class="carousel-wrap">
          <button class="carousel-btn carousel-btn-prev" aria-label="Anterior">
            <i class="ph ph-caret-left"></i>
          </button>
          <div class="carousel-track-outer">
            <div class="carousel-track" id="similarTrack"></div>
          </div>
          <button class="carousel-btn carousel-btn-next" aria-label="Próximo">
            <i class="ph ph-caret-right"></i>
          </button>
        </div>

      </section>
    </main>

    <footer id="app-footer"></footer>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/watchlist.js"></script>
    <script src="assets/js/modal-watchlist.js"></script>
    <script src="assets/js/modal-trailer.js"></script>
    <script src="assets/js/modal-result.js"></script>
    <script src="assets/js/randomizer.js"></script>
    <script src="assets/js/carousel.js"></script>
    <script src="assets/js/title.js"></script>

  </body>

</html>
